<div class="contenedor">
  <div class="contenedor-izquierda"></div>

  <div class="contenedor-derecha">
    <div class="formulario-login">
      <h1>🍎LUJUMA🍎</h1>
      <h2>Becoming your happiest self😉</h2>
<!--Formulario de ingreso de credenciales-->
      <div class="etiqueta-email"><label for="username">👤Your username:</label></div>
      <input type="text" id="username" [(ngModel)]="campoUsuario" placeholder="lujumaUsername">

      <div class="etiqueta-password"><label for="password">🔒Your password:</label> </div>
      <input type="password" id="password" [(ngModel)]="campoContrasenia" placeholder="**********">

      <p>Don't have an account? <a href="/data">Sign up here</a></p>

      <button (click)="iniciarSesion()">Sign in</button>
    </div>
  </div>
</div>
<!--Modal de pregunta de verificacion-->
@if (mostrarRequerimientoPrivacidad) {
  <div class="modal-verificacion">
    <div class="modal-contenido">
      <h3>😉🍎Your privacy is first</h3>
      <p>We value your privacy so let's make a verification question</p>

      <label class="pregunta-texto">{{ preguntaPrivacidad }}?</label>
      <input type="text" [(ngModel)]="campoRespuesta" placeholder="Type your answer">

      <div class="modal-botones">
        <button class="btn-verificar" (click)="validarPreguntaSeguridad()">Verify & Enter</button>
      </div>
    </div>
  </div>
}
